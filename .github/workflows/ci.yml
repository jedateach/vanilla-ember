name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request: {}

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:

  test:
    name: "Test"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install Ember
        run: pnpx ember-cli@5 new fresh-app --package-manager=pnpm
      - name: Update test-helpers package
        run: cd fresh-app && pnpm add @ember/test-helpers@4.0.5
      - name: Install puppeteer
        run: pnpm install
      - name: Serve and dump with puppeteer
        run: |
          cd fresh-app
          pnpm ember serve --environment=production & echo $! > ../server.pid
          pnpx wait-on http://localhost:4200
          node ../dump-browser.js || { echo "Console errors detected"; exit 1; }
      - name: clean up
        run: |
          kill $(cat server.pid) || true
          rm server.pid
